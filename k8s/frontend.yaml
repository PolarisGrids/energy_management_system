apiVersion: v1
kind: ConfigMap
metadata:
  name: polaris-ems-nginx-conf
  namespace: polaris-ems
data:
  nginx.conf: |
    events {
        worker_connections 1024;
    }

    http {
        include /etc/nginx/mime.types;
        default_type application/octet-stream;
        sendfile on;
        keepalive_timeout 65;
        client_max_body_size 50M;

        upstream backend {
            server polaris-ems-backend:8000;
        }

        server {
            listen 80;
            listen [::]:80;
            server_name _;
            root /usr/share/nginx/html;
            index index.html;

            # Frontend - SPA routing
            location / {
                try_files $uri $uri/ /index.html;
            }

            # Backend API
            location /api/ {
                proxy_pass http://backend;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
            }

            # SSE — disable buffering for real-time streaming
            location /api/v1/events/ {
                proxy_pass http://backend;
                proxy_set_header Host $host;
                proxy_set_header Connection '';
                proxy_http_version 1.1;
                proxy_buffering off;
                proxy_cache off;
                proxy_read_timeout 86400s;
                chunked_transfer_encoding on;
            }
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: polaris-ems-frontend
  namespace: polaris-ems
spec:
  replicas: 1
  selector:
    matchLabels:
      app: polaris-ems-frontend
  template:
    metadata:
      labels:
        app: polaris-ems-frontend
    spec:
      imagePullSecrets:
        - name: ecr-secret
      tolerations:
        - key: "service"
          operator: "Equal"
          value: "MDMS"
          effect: "NoSchedule"
      nodeSelector:
        kubernetes.io/arch: arm64
      volumes:
        - name: nginx-conf
          configMap:
            name: polaris-ems-nginx-conf
      containers:
        - name: frontend
          image: 703623468956.dkr.ecr.ap-south-1.amazonaws.com/dev/polaris-ems/frontend:latest
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: polaris-ems-frontend
  namespace: polaris-ems
spec:
  selector:
    app: polaris-ems-frontend
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
