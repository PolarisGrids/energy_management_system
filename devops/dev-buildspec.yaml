version: 0.2

phases:
  install:
    commands:
      - echo "Installing kubectl..."
      - curl -LO "https://dl.k8s.io/release/v1.27.2/bin/linux/amd64/kubectl"
      - chmod +x ./kubectl
      - mkdir -p $HOME/bin && cp ./kubectl $HOME/bin/kubectl
      - export PATH=$PATH:$HOME/bin
      - echo 'export PATH=$PATH:$HOME/bin' >> ~/.bashrc
      - kubectl version --client

  pre_build:
    commands:
      - echo "Logging in to ECR..."
      - BACKEND_IMAGE=$REPOSITORY_URI/dev/polaris-ems/backend
      - FRONTEND_IMAGE=$REPOSITORY_URI/dev/polaris-ems/frontend
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $REPOSITORY_URI
      - IMAGE_TAG=build-$(echo $CODEBUILD_BUILD_ID | awk -F":" '{print $2}')
      - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - echo "IMAGE_TAG=$IMAGE_TAG COMMIT_HASH=$COMMIT_HASH"
      - echo "Creating ECR repositories if they do not exist..."
      - aws ecr create-repository --repository-name dev/polaris-ems/backend --region $AWS_DEFAULT_REGION --image-scanning-configuration scanOnPush=true || true
      - aws ecr create-repository --repository-name dev/polaris-ems/frontend --region $AWS_DEFAULT_REGION --image-scanning-configuration scanOnPush=true || true

  build:
    commands:
      - echo "Building backend image (native arm64)..."
      - docker build -t $BACKEND_IMAGE:latest -t $BACKEND_IMAGE:$IMAGE_TAG backend/
      - echo "Building frontend image (native arm64)..."
      - docker build -t $FRONTEND_IMAGE:latest -t $FRONTEND_IMAGE:$IMAGE_TAG frontend/

  post_build:
    commands:
      - echo "Pushing backend images..."
      - docker push $BACKEND_IMAGE:latest
      - docker push $BACKEND_IMAGE:$IMAGE_TAG
      - echo "Pushing frontend images..."
      - docker push $FRONTEND_IMAGE:latest
      - docker push $FRONTEND_IMAGE:$IMAGE_TAG
      - echo "Configuring kubectl for dev-cluster..."
      - aws eks update-kubeconfig --name $CLUSTER_NAME --region $AWS_DEFAULT_REGION
      - echo "Creating ECR pull secret in polaris-ems namespace..."
      - kubectl create namespace polaris-ems --dry-run=client -o yaml | kubectl apply -f -
      - |
        kubectl create secret docker-registry ecr-secret \
          --docker-server=$REPOSITORY_URI \
          --docker-username=AWS \
          --docker-password=$(aws ecr get-login-password --region $AWS_DEFAULT_REGION) \
          --namespace polaris-ems \
          --dry-run=client -o yaml | kubectl apply -f -
      - echo "Applying K8s manifests..."
      - kubectl apply -f k8s/
      - echo "Restarting deployments to pick up new images..."
      - kubectl rollout restart deployment/polaris-ems-backend -n polaris-ems
      - kubectl rollout restart deployment/polaris-ems-frontend -n polaris-ems
      - echo "Waiting for rollouts..."
      - kubectl rollout status deployment/polaris-ems-backend -n polaris-ems --timeout=300s
      - kubectl rollout status deployment/polaris-ems-frontend -n polaris-ems --timeout=300s
      - echo "Deployment complete."
      - kubectl get all -n polaris-ems
